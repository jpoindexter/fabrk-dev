<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Terminal screen background -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- Terminal prompt "> _" in phosphor green -->
  <!-- Greater than symbol ">" -->
  <path d="M128 160 L224 256 L128 352" stroke="#00ff41" stroke-width="32" stroke-linecap="square" fill="none"/>

  <!-- Underscore "_" cursor -->
  <rect x="272" y="320" width="96" height="32" fill="#00ff41"/>
</svg>
