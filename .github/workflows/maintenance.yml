name: Maintenance

on:
  schedule:
    # Run daily at 1 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  NODE_VERSION: '20.x'

jobs:
  stale-issues:
    name: Mark Stale Issues
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Close stale issues
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been inactive for 30 days. If no further activity occurs, it will be closed in 7 days.'
          stale-pr-message: 'This pull request has been inactive for 14 days. If no further activity occurs, it will be closed in 7 days.'
          close-issue-message: 'This issue was closed due to inactivity. Please reopen if you would like to continue discussion.'
          close-pr-message: 'This pull request was closed due to inactivity. Please reopen if you would like to continue.'
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'

  security-updates:
    name: Check Security Updates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run npm audit
        id: audit
        run: npm audit --json > audit-report.json 2>&1 || true

      - name: Check for vulnerabilities
        run: |
          VULNERABILITIES=$(npm audit --json | jq '.metadata.vulnerabilities.total' 2>/dev/null || echo 0)
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "Found $VULNERABILITIES vulnerabilities"
            exit 1
          fi
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: Vulnerabilities detected in dependencies',
              body: `Security vulnerabilities were detected during the scheduled maintenance check.

              Run \`npm audit\` locally to review and fix them.

              Priority: **HIGH**
              Date: ${new Date().toISOString()}`,
              labels: ['security', 'automated']
            });
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30
        if: always()

  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const now = new Date();
            const expirationDays = 30;

            let deleted = 0;
            for (const artifact of artifacts.data.artifacts) {
              const createdDate = new Date(artifact.created_at);
              const ageInDays = (now - createdDate) / (1000 * 60 * 60 * 24);

              if (ageInDays > expirationDays) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                deleted++;
              }
            }

            console.log(`Deleted ${deleted} old artifacts`);

  health-check:
    name: Repository Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate health report
        run: |
          echo "## Repository Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### File Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Files:** $(find . -type f -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/.next/*' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **TypeScript Files:** $(find . -type f -name '*.ts' -o -name '*.tsx' | grep -v node_modules | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Lines of Code:** $(find src -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -not -path '*/node_modules/*' -exec wc -l {} + | tail -1 | awk '{print $1}')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration Files" >> $GITHUB_STEP_SUMMARY
          ls -la | grep -E "^\.|package\.json|tsconfig|next\.config" | awk '{print "- " $NF}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Last Check:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
