name: Performance Monitoring

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run performance checks daily at 3 AM UTC
    - cron: '0 3 * * *'

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20.x'

jobs:
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'
          NEXTAUTH_SECRET: 'test-secret'
          NEXTAUTH_URL: 'http://localhost:3000'
          SKIP_ENV_VALIDATION: 'true'

      - name: Analyze bundle size
        id: bundle
        run: |
          if [ -d ".next/static" ]; then
            echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Main Bundle" >> $GITHUB_STEP_SUMMARY
            find .next/static/chunks -name "*.js" -type f | while read file; do
              size=$(du -h "$file" | cut -f1)
              name=$(basename "$file")
              echo "- **$name**: $size" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Total Static Size" >> $GITHUB_STEP_SUMMARY
            totalSize=$(du -sh .next/static | cut -f1)
            echo "- **Total**: $totalSize" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: .next/
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment bundle size on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let bundleInfo = '📦 **Bundle Size Analysis**\n\n';

            if (fs.existsSync('.next/static/chunks')) {
              const files = fs.readdirSync('.next/static/chunks').filter(f => f.endsWith('.js'));
              const sizes = files.map(f => {
                const fullPath = path.join('.next/static/chunks', f);
                const stat = fs.statSync(fullPath);
                return { name: f, size: stat.size };
              }).sort((a, b) => b.size - a.size);

              bundleInfo += '| File | Size |\n|------|------|\n';
              sizes.slice(0, 5).forEach(({ name, size }) => {
                const sizeKb = (size / 1024).toFixed(2);
                bundleInfo += `| ${name} | ${sizeKb} KB |\n`;
              });
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: bundleInfo
            });
        continue-on-error: true

  lighthouse-ci:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret'
          NEXTAUTH_URL: 'http://localhost:3000'

      - name: Start dev server
        run: |
          npm run dev > /tmp/lighthouse-dev.log 2>&1 &
          sleep 10
          timeout 30 bash -c 'until curl -f http://localhost:3000; do sleep 1; done'
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret'
          NEXTAUTH_URL: 'http://localhost:3000'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@latest

      - name: Run Lighthouse CI
        id: lighthouse
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 7

      - name: Comment Lighthouse scores on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.lighthouseci/manifest.json';

            if (!fs.existsSync(path)) {
              console.log('Lighthouse report not found');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
            const scores = manifest[0].summary;

            const body = `⚡ **Lighthouse Performance Audit**

            | Metric | Score |
            |--------|-------|
            | Performance | ${Math.round(scores.performance * 100)} |
            | Accessibility | ${Math.round(scores.accessibility * 100)} |
            | Best Practices | ${Math.round(scores['best-practices'] * 100)} |
            | SEO | ${Math.round(scores.seo * 100)} |`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        continue-on-error: true
