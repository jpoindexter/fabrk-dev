name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '20.x'

jobs:
  ci-checks:
    name: Run CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run type-check

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'

      - name: Run database migrations
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret'
          NEXTAUTH_URL: 'http://localhost:3000'

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'
          NEXTAUTH_SECRET: 'deployment-check-secret'
          NEXTAUTH_URL: 'http://localhost:3000'
          SKIP_ENV_VALIDATION: 'true'

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        if: secrets.VERCEL_TOKEN != ''
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Skip Vercel deployment
        if: secrets.VERCEL_TOKEN == ''
        run: echo "Vercel token not configured. Skipping deployment. Add VERCEL_TOKEN secret to enable."

  deploy-notification:
    name: Deployment Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [ci-checks, deploy-vercel]

    steps:
      - name: Check deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const ciStatus = '${{ needs.ci-checks.result }}';
            const deployStatus = '${{ needs.deploy-vercel.result }}';

            if (ciStatus === 'failure') {
              console.log('CI checks failed, deployment was not attempted');
              process.exit(1);
            }

            if (deployStatus === 'success') {
              console.log('Deployment completed successfully');
            } else if (deployStatus === 'skipped') {
              console.log('Deployment skipped: Vercel not configured');
            } else {
              console.log('Deployment failed or was cancelled');
              process.exit(1);
            }

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.deploy-vercel.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View full workflow: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
