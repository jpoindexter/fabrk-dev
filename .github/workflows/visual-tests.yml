name: Visual Regression Tests

on:
  pull_request:
    branches: [main, lean]

permissions:
  contents: read
  pull-requests: write

jobs:
  visual-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: test-secret-for-ci

      - name: Run visual regression tests
        run: npm run test:visual
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: test-secret-for-ci

      - name: Upload visual diff report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-report
          path: playwright-report/
          retention-days: 30

      - name: Comment on PR if visual tests fail
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Visual regression tests failed!**\n\nScreenshots differ from baselines. Please review the [visual diff report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) in Actions.\n\nIf the changes are intentional, run `npm run test:visual:update` locally and commit the updated snapshots.'
            });
